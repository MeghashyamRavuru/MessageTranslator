<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    {% load static %}

    <style>
        body {
            font-family: Arial, sans-serif;
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center; 
            align-items: center;   
            background-image: url("{% static 'images/login.jpeg' %}");
            background-size:cover;
            background-position:center;
        }

        h2 {
            text-align: center;
            font-style: italic; 
            font-size: 24px;
        }

        form {
            width: 300px;
            padding: 20px;
            color:white;
        }

        div {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-size: 16px;
        }

        input {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            font-size: 16px;
            border-radius: 8px; 
            border: 1px solid #ccc;
            background-color: white; 
        }

        .buttons {
            text-align: center;
        }

        button {
            width: auto;
            padding: 12px 20px;
            background-color: #a0e6f1;  
            color: black; 
            border: none;
            border-radius: 8px; 
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
        	background-color: #1E90FF;
        }
    </style>
</head>
<body>

    <form id="loginForm">
        <h2>Login</h2>

        <div>
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" placeholder="👩‍💻️" required>
        </div>

        <div>
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" placeholder="🔑️" required>
        </div>

        <div class="buttons">
            <button type="submit" form="loginForm">Login</button>
        </div>
        <div>
            Not a Member? <a href="{% url 'signup' %}" class="btn" style="color: red;">Signup</a> 
        </div>
    </form>
    
</body>
</html>
