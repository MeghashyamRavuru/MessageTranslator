<!DOCTYPE html>
<html>
<head>
    <title>SignUp</title>
    {% load static %}
    <style>
        body {
            font-family: Arial, sans-serif;
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center; 
            align-items: center;   
            background-image: url("{% static 'images/sign.jpeg' %}");
            background-size:cover;
            background-position:center;
        }

        h2 {
            text-align: center;
            font-style: italic; 
            font-size: 24px;
        }

        form {
            text-align: center;
            width: 300px;
            padding: 20px;
            color:white;
        
        }

        div {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-size: 16px;
            text-align: left;
        }

        input,select {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            font-size: 16px;
            border-radius: 8px; 
            border: 1px solid #ccc;
            background-color:white; 
        }

        .buttons {
            text-align: center;
        }

        button {
            padding: 12px 20px;
            background-color: #1E90FF;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            display: inline-block;
        
        }

        button:hover {
            background-color: #6495ED; 
        }   
    </style>
</head>
<body>
    
    <form id="signupForm">
        <h2>SignUp</h2>
        <div >
            <label for="username">Username:</label>
            <input type="text" id="username" placeholder="👩‍💻"required>
        </div>
        <div >
            <label for="email">Email:</label>
            <input type="email" id="email" placeholder="✉️" required>
        </div>
        <div >
            <label for="language">Enter your language:</label>
            <select id="language" required>
                <option value="">🌍️ Select Language</option>
                <option value="English">English</option>
                <option value="Telugu">Telugu</option>
                <option value="Hindi">Hindi</option>
                <option value="Tamil">Tamil</option>
                <option value="Kannada">Kannada</option>
            </select>
        </div>
        <div >
            <label for="password">Password:</label>
            <input type="password" id="password" placeholder="🔑️" required>
        </div>

        <div >
            <label for="confirmPassword">Confirm Password:</label>
            <input type="password" id="confirmPassword" placeholder="✅️" required>
        </div>

        <div id="buttons">
            <button type="submit" form="signupForm">Signup</button>
        </div>
    </form>
    
</body>
</html>
